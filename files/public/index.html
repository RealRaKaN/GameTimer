<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME STATION</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --card: rgba(10, 10, 10, 0.9); --border: #fff; --text: #fff; --muted: #aaa; --accent: #00ff88; --danger: #ff4444; }
  body { 
    background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('bg.jpg') center/cover fixed;
    color: var(--text); font-family: 'Cairo'; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .screen { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; }
  .screen.visible { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 2rem; width: 100%; text-align: center; backdrop-filter: blur(5px); }
  .pw-wrap { position: relative; width: 100%; margin-bottom: 1rem; }
  input[type="password"], input[type="text"] { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; color: #fff; font-family: 'Cairo'; text-align: center; font-size: 1.2rem; outline: none; }
  .eye-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
  .btn { width: 100%; padding: 1rem; border-radius: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); font-size: 1rem; margin-top: 0.5rem; }
  .btn-white { background: #fff; color: #000; }
  .btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  .timer { font-size: 3.5rem; font-weight: 900; margin: 1rem 0; direction: ltr; }
  .wallet-box { border: 1px dashed var(--accent); background: rgba(0,255,136,0.05); padding: 1rem; border-radius: 10px; margin: 1rem 0; }
  .upload-box { border: 1px solid #333; padding: 1rem; border-radius: 10px; margin-top: 1rem; background: rgba(0,0,0,0.6); }
  .logout-btn { position: absolute; top: 1rem; left: 1rem; padding: 0.5rem 1rem; background: rgba(0,0,0,0.8); border: 1px solid #fff; border-radius: 20px; color: #fff; cursor: pointer; }
</style>
</head>
<body>

<div class="screen visible" id="s-login">
  <h1>GAME STATION</h1>
  <p style="color:var(--muted); margin-bottom:1.5rem;">أدخل كلمة المرور للمتابعة</p>
  <div class="card">
    <div class="pw-wrap">
      <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="eye-btn" onclick="toggleEye()" id="eye-icon">👁</button>
    </div>
    <button class="btn btn-white" id="login-btn" onclick="doLogin()">دخول</button>
  </div>
</div>

<div class="screen" id="s-player">
  <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
  <h1 id="player-name">اللاعب</h1>
  <p id="player-status-text" style="color:var(--muted); margin-bottom:1rem;">جاري المزامنة...</p>
  <div class="card">
    <div class="timer" id="player-timer">00:00:00</div>
    <div id="view-idle" style="display:none;"><button class="btn btn-white" onclick="playerAction('start', false)">ابدأ اللعب (أساسي)</button></div>
    <div id="view-playing" style="display:none;"><button class="btn btn-danger" onclick="playerAction('stop', false)">إنهاء اللعب</button></div>
    <div id="view-cooldown" style="display:none;"><p style="color:var(--danger); font-weight:700;">أنت في فترة حظر إجبارية للراحة</p></div>
    <div class="upload-box" id="upload-box" style="display:none;">
      <p style="font-size:0.85rem; color:var(--muted);">ارفع إثبات المشي (15-30 دقيقة) للمكافأة</p>
      <p id="upload-tries-text" style="color:var(--danger); font-size:0.75rem; margin-bottom:0.5rem;"></p>
      <input type="file" id="proof-img" accept="image/*">
      <button class="btn btn-white" id="btn-upload" onclick="sendProof()" style="font-size:0.8rem;">تحقق عبر AI</button>
    </div>
    <div class="wallet-box" id="wallet-box" style="display:none;">
      <p style="color:var(--accent); font-size:0.8rem;">رصيد المحفظة</p>
      <h2 id="wallet-mins">0 دقيقة</h2>
      <button class="btn btn-white" id="btn-use-wallet" onclick="playerAction('start', true)" style="display:none;">استخدم المحفظة والعب الآن</button>
    </div>
  </div>
</div>

<script>
let currentUser = null; 
let syncInterval = null; 

function toggleEye() {
  const pw = document.getElementById('pw');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}

async function doLogin() {
  const pw = document.getElementById('pw').value;
  const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ password: pw }) });
  const data = await res.json();
  if (data.ok) {
    currentUser = data;
    if (data.isAdmin) location.reload(); // أو وجهه لصفحة الإدارة
    else { document.getElementById('player-name').textContent = data.name; showScreen('s-player'); startSync(); }
  } else alert("خطأ!");
}

function startSync() { syncInterval = setInterval(fetchState, 1000); fetchState(); }

async function fetchState() {
  if (!currentUser) return;
  const res = await fetch(`/api/status/${currentUser.index}`);
  const data = await res.json();
  if (data.ok) updatePlayerUI(data.state, data.global);
}

function updatePlayerUI(state, global) {
  const sText = document.getElementById('player-status-text');
  const timer = document.getElementById('player-timer');
  const wallet = document.getElementById('wallet-box');
  const upload = document.getElementById('upload-box');
  
  wallet.style.display = 'block';
  document.getElementById('wallet-mins').textContent = state.wallet + " دقيقة";
  document.getElementById('upload-tries-text').textContent = `متبقي ${state.uploadTries} محاولات`;

  if (state.status === 'idle') {
    if (global && global.isOccupied && global.occupiedBy !== currentUser.name) {
      sText.textContent = `⚠️ الجهاز مشغول من قبل: ${global.occupiedBy}`;
      timer.textContent = "مشغول";
      upload.style.display = 'block';
    } else {
      sText.textContent = "مستعد للعب";
      timer.textContent = "02:00:00";
      document.getElementById('view-idle').style.display = 'block';
      document.getElementById('btn-use-wallet').style.display = state.wallet > 0 ? 'block' : 'none';
    }
  } else if (state.status === 'playing') {
    document.getElementById('view-playing').style.display = 'block';
    timer.textContent = fmt(Math.max(0, Math.ceil((state.endTime - Date.now())/1000)));
  } else if (state.status === 'cooldown') {
    document.getElementById('view-cooldown').style.display = 'block';
    upload.style.display = 'block';
    timer.textContent = fmt(Math.max(0, Math.ceil((state.cooldownUntil - Date.now())/1000)));
  }
}

async function playerAction(action, useWallet) {
  if (useWallet && !confirm("استهلاك رصيد المحفظة؟")) return;
  await fetch('/api/action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ idx: currentUser.index, action, useWallet }) });
}

async function sendProof() {
  const file = document.getElementById('proof-img').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const res = await fetch('/api/proof', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ brotherIndex: currentUser.index, image: e.target.result }) });
    const data = await res.json();
    alert(data.approved ? "✅ قُبلت!" : "❌ رُفضت!");
  };
  reader.readAsDataURL(file);
}

function fmt(s) { return String(Math.floor(s/3600)).padStart(2,'0')+":"+String(Math.floor((s%3600)/60)).padStart(2,'0')+":"+String(s%60).padStart(2,'0'); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible')); document.getElementById(id).classList.add('visible'); }
function logout() { location.reload(); }
</script>
</body>
</html>
